<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Đồ án ĐHMT - Ninja Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #skillUI {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none; /* Hide initially */
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .skill-icon {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease-out;
            background-color: #333;
        }

        .skill-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .skill-key {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            padding-top: 1px; /* Căn giữa quang học (Optical centering) */
        }

        /* Animation class when a skill is used */
        .skill-active {
            transform: scale(1.3);
            border-color: #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
        }
    </style>
</head>

<body>
    <button id="btnMuteBGM"
        style="position: absolute; top: 20px; right: 160px; padding: 10px 20px; background-color: #17a2b8; color: white; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; z-index: 10;">Tắt
        Nhạc 🔊</button>
    <button id="btnPause"
        style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background-color: #ffc107; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; z-index: 10;">Tạm
        Dừng ⏸️</button>
    <div id="fpsCounter"
        style="position: absolute; top: 60px; right: 20px; color: #00ff00; font-weight: bold; font-family: monospace; font-size: 18px; text-shadow: 1px 1px 2px black; z-index: 10;">
        FPS: 0</div>

    <!-- Giao diện Điểm số và Tiền vàng -->
    <div
        style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 10; font-family: 'Impact', sans-serif; pointer-events: none;">
        <div style="text-align: center;">
            <div style="color: #f1c40f; font-size: 18px; text-shadow: 2px 2px 4px black; letter-spacing: 2px;">SCORE
            </div>
            <div id="scoreUI" style="color: white; font-size: 36px; text-shadow: 2px 2px 4px black;">0</div>
        </div>
        <div style="text-align: center;">
            <div style="color: #f1c40f; font-size: 18px; text-shadow: 2px 2px 4px black; letter-spacing: 2px;">COINS
            </div>
            <div id="coinUI" style="color: #f1c40f; font-size: 36px; text-shadow: 2px 2px 4px black;">0 🪙</div>
        </div>
    </div>
    <!-- Thanh thời gian Susanoo -->
    <div id="susanooBarContainer"
        style="display: none; position: absolute; top: 90px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; background: rgba(0,0,0,0.6); border: 2px solid #a832a8; border-radius: 10px; z-index: 10; pointer-events: none; overflow: hidden; box-shadow: 0 0 15px #a832a8, inset 0 0 5px black;">
        <div id="susanooBarInner"
            style="width: 100%; height: 100%; background: linear-gradient(90deg, #6a1b9a, #d500f9, #ea80fc); border-radius: 8px; box-shadow: inset 0 0 10px rgba(255,255,255,0.5); transform-origin: left; transform: scaleX(1);">
        </div>
    </div>

    <button id="btnToggleTrees"
        style="position: absolute; top: 100px; right: 20px; padding: 10px 20px; background-color: #28a745; color: white; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; z-index: 10;">Ẩn
        Núi </button>

    <div
        style="position: absolute; top: 150px; right: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; color: white; font-family: sans-serif; display: flex; flex-direction: column; gap: 10px;">

        <label for="timeMode" style="font-weight: bold;">Thời gian:</label>
        <select id="timeMode" style="padding: 5px; border-radius: 5px; cursor: pointer;">
            <option value="auto">Tự động (Theo điểm)</option>
            <option value="day">Trời sáng</option>
            <option value="night">Trời tối</option>
        </select>

        <label for="practiceMode" style="font-weight: bold;">Luyện tập:</label>
        <select id="practiceMode" style="padding: 5px; border-radius: 5px; cursor: pointer;">
            <option value="0">Ngẫu nhiên (Mặc định)</option>
            <option value="1">Mẫu 1: Đá rơi 1 làn</option>
            <option value="2">Mẫu 2: Tường đá kép</option>
            <option value="3">Mẫu 3: Ziczac chéo</option>
            <option value="4">Mẫu 4: Phi tiêu tầm cao</option>
            <option value="5">Mẫu 5: Lách khe hẹp</option>
            <option value="6">Mẫu 6: Thiên thạch lở</option>
            <option value="7">Mẫu 7: Đá khổng lồ (Ép trượt)</option>
            <option value="8">Mẫu 8: Đá khổng lồ (Ép nhảy)</option>
            <option value="9">Mẫu 9: Cột gỗ + Phi tiêu chìm</option>
        </select>
    </div>
    <div id="skillUI">
        <div id="skill3_icon" class="skill-icon">
            <img src="textures/sasuke's skillset/skill3.png" alt="Susanoo" />
            <div class="skill-key">3</div>
        </div>
        <div id="skill2_icon" class="skill-icon">
            <img src="textures/sasuke's skillset/skill2.png" alt="Chidori" />
            <div class="skill-key">2</div>
        </div>
        <div id="skill1_icon" class="skill-icon">
            <img src="textures/sasuke's skillset/skill1.png" alt="Katon" />
            <div class="skill-key">1</div>
        </div>
    </div>

    <!-- Màn hình Cut-in Susanoo (Dual Eyes) -->
    <img id="dualEyesCutin" src="textures/dual_eyes.png" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); opacity: 0; pointer-events: none; z-index: 150; width: 80%; max-width: 800px; transition: opacity 0.1s ease-in, transform 0.6s ease-out;" />

    <!-- Màn hình Bắt đầu (Start Menu) -->
    <div id="startMenuUI"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif;">
        <h1 style="color: white; font-size: 5rem; text-shadow: 2px 2px 10px #00e5ff, 0 0 20px #00e5ff; margin-bottom: 50px;">
            NINJA RUNNER
        </h1>
        <button id="btnStartGame"
            style="padding: 20px 50px; font-size: 2rem; font-weight: bold; background: linear-gradient(90deg, #ff8a00, #e52e71); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(229, 46, 113, 0.5); transition: transform 0.2s;">
            ▶ CHƠI GAME
        </button>
        
        <div style="margin-top: 50px; color: #ddd; text-align: center; font-size: 1.2rem; line-height: 1.8; text-shadow: 1px 1px 5px black; background: rgba(0,0,0,0.5); padding: 20px 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);">
            <h3 style="margin-top: 0; color: #00e5ff; font-size: 1.5rem; margin-bottom: 15px;">HƯỚNG DẪN</h3>
            <p style="margin: 5px 0;"><strong>Phím A / D (hoặc Trái / Phải):</strong> Lách trái/phải</p>
            <p style="margin: 5px 0;"><strong>Phím 1:</strong> Đại hỏa cầu (Phá chướng ngại vật)</p>
            <p style="margin: 5px 0;"><strong>Phím 2:</strong> Chidori (Phóng tốc độ cao)</p>
            <p style="margin: 5px 0;"><strong>Phím 3:</strong> Susanoo (Bất tử & Bay tự do)</p>
            <p style="margin: 5px 0; color: #ffc107;"><strong>Space:</strong> Tạm dừng</p>
        </div>
    </div>

    <!-- Màn hình hiển thị khi thua game -->
    <div id="gameOverUI"
        style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: none; color: #ff3333; font-family: sans-serif; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 100; pointer-events: none;">
        <h1
            style="font-size: 6rem; text-shadow: 2px 2px 5px black, 0px 0px 20px red; margin-bottom: 10px; margin-top: 0;">
            GAME OVER</h1>
        <p
            style="color: white; font-size: 1.5rem; text-shadow: 1px 1px 4px black, 0px 0px 10px red; margin-bottom: 30px; font-weight: bold;">
            Bạn đã đâm trúng vật cản rùi kìa!</p>
        <button onclick="resetGame()"
            style="pointer-events: auto; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; background: #dc3545; color: white; border: 2px solid white; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.5);">Chơi
            Lại (Backspace)</button>
    </div>

    <!-- Load Three.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Load GLTFLoader để đọc file .glb -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Load OBB để tính toán va chạm nghiêng chính xác 100% -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/OBB.js"></script>
    <!-- File logic game của bạn -->
    <script type="module" src="src/main.js"></script>
</body>

</html>
